<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRẮC NGHIỆM XÁC SUẤT THỐNG KÊ</title>
    <style>
        :root {
            --primary: #4361ee;
            --primary-hover: #3a53d0;
            --bg-color: #f4f7fe;
            --card-bg: #ffffff;
            --text-main: #2b3674;
            --text-light: #a3aed1;
            --success: #05cd99;
            --danger: #ee5d50;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typography */
        h1, h2, h3 {
            text-align: center;
            color: var(--text-main);
            margin-bottom: 20px;
            font-weight: 700;
        }

        p {
            color: var(--text-main);
        }

        /* Buttons */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(67, 97, 238, 0.2);
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(67, 97, 238, 0.3);
        }

        button.btn-danger {
            background-color: var(--danger);
            box-shadow: 0 4px 6px rgba(238, 93, 80, 0.2);
        }

        button.btn-danger:hover {
            background-color: #d14e43;
            box-shadow: 0 6px 12px rgba(238, 93, 80, 0.3);
        }

        button.btn-outline {
            background-color: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            box-shadow: none;
        }

        button.btn-outline:hover {
            background-color: var(--primary);
            color: white;
        }

        /* Layouts & Cards */
        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        .question-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border-color);
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        /* Options */
        .option-label {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            margin: 10px 0;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #fafbff;
            font-weight: 500;
        }

        .option-label:hover {
            border-color: var(--primary);
            background: #f0f4ff;
        }

        .option-label input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.2);
            accent-color: var(--primary);
        }

        /* Timer */
        .sticky-header {
            position: sticky;
            top: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            padding: 15px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .timer {
            font-size: 20px;
            font-weight: bold;
            color: var(--danger);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Utilities */
        .hidden { display: none !important; }
        .text-success { color: var(--success); font-weight: bold; }
        .text-danger { color: var(--danger); font-weight: bold; }
        
        /* Results & History */
        .explanation-box {
            background: #e8f4f8;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid var(--primary);
            font-style: italic;
            color: #4a5568;
        }

        .history-item {
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            background: var(--card-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .history-score {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="container card" id="homePage">
    <div style="text-align: center; margin-bottom: 30px;">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
    </div>
    <h1>TRẮC NGHIỆM XÁC SUẤT THỐNG KÊ</h1>
    <p style="text-align: center; color: var(--text-light); font-size: 18px;">Củng cố kiến thức khoa học sức khỏe & xác suất thống kê</p>
    
    <div style="background: var(--bg-color); padding: 20px; border-radius: 12px; margin-top: 30px; display: flex; justify-content: space-around;">
        <div style="text-align: center;">
            <div style="font-size: 24px; font-weight: bold; color: var(--primary);">40</div>
            <div style="color: var(--text-light); font-size: 14px;">Câu hỏi</div>
        </div>
        <div style="text-align: center;">
            <div style="font-size: 24px; font-weight: bold; color: var(--primary);">60</div>
            <div style="color: var(--text-light); font-size: 14px;">Phút</div>
        </div>
    </div>

    <div class="btn-group">
        <button onclick="startQuiz()">Bắt đầu làm bài</button>
        <button class="btn-outline" onclick="showHistory()">Lịch sử làm bài</button>
    </div>
</div>

<div class="container hidden" id="quizPage">
    <div class="sticky-header">
        <h3 style="margin: 0; color: var(--text-main);">Bài Thi</h3>
        <div class="timer" id="timerDisplay">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            60:00
        </div>
    </div>
    <div id="quizContainer"></div>
    <div style="text-align: center; margin: 40px 0;">
        <button onclick="submitQuiz()" style="padding: 15px 40px; font-size: 18px;">Nộp bài ngay</button>
    </div>
</div>

<div class="container card hidden" id="resultPage">
    <h1>Kết Quả Của Bạn</h1>
    <div style="text-align: center; margin: 30px 0;">
        <div id="scoreCircle" style="width: 150px; height: 150px; border-radius: 50%; border: 8px solid var(--primary); display: flex; align-items: center; justify-content: center; margin: 0 auto; font-size: 36px; font-weight: bold; color: var(--primary);">
            <span id="scoreDisplay">0/40</span>
        </div>
    </div>
    
    <div class="btn-group">
        <button onclick="goHome()">Về trang chủ</button>
        <button class="btn-outline" onclick="showHistory()">Xem lịch sử</button>
    </div>
    
    <h3 style="margin-top: 50px; text-align: left;">Chi tiết bài làm:</h3>
    <div id="reviewContainer" style="margin-top: 20px;"></div>
</div>

<div class="container card hidden" id="historyPage">
    <h1>Lịch Sử Làm Bài</h1>
    <div class="btn-group" style="margin-bottom: 30px;">
        <button class="btn-outline" onclick="goHome()">Về trang chủ</button>
        <button class="btn-danger" onclick="clearHistory()">Xóa lịch sử</button>
    </div>
    <div id="historyContainer"></div>
</div>

<script>
    // Database placeholder (Giữ nguyên data 15 câu đã tạo ở bước trước)
    const quizDatabase = [
        {
            id: 1, category: "theory", difficulty: "easy",
            question: "Tập hợp bao gồm tất cả các đối tượng cần nghiên cứu một đặc tính nào đó được gọi là gì?",
            options: { A: "Mẫu (Sample)", B: "Tổng thể (Population)", C: "Biến số (Variable)", D: "Dữ liệu (Data)" },
            correctAnswer: "B",
            explanation: "Tổng thể (Population) là tập hợp tất cả các đối tượng cần nghiên cứu một đặc tính nào đó."
        },
        {
            id: 2, category: "theory", difficulty: "easy",
            question: "Biến số 'Nhóm máu (A, B, AB, O)' thuộc loại biến số nào?",
            options: { A: "Biến định lượng rời rạc", B: "Biến định lượng liên tục", C: "Biến định tính danh mục", D: "Biến định tính thứ bậc" },
            correctAnswer: "C",
            explanation: "Nhóm máu là biến định tính danh mục vì nó phản ánh tính chất, phân loại, có nhiều giá trị và không có thứ bậc."
        },
        {
            id: 3, category: "theory", difficulty: "easy",
            question: "Mode (Số yếu vị) của một tập dữ liệu là gì?",
            options: { A: "Giá trị lớn nhất", B: "Giá trị nằm chính giữa", C: "Giá trị bình quân", D: "Giá trị xuất hiện với tần số lớn nhất" },
            correctAnswer: "D",
            explanation: "Số yếu vị (Mode) là giá trị có tần số xuất hiện lớn nhất trong tập dữ liệu."
        },
        {
            id: 4, category: "theory", difficulty: "medium",
            question: "Sự khác biệt chính giữa biến định lượng rời rạc và biến định lượng liên tục là gì?",
            options: { A: "Rời rạc đo bằng chữ, liên tục đo bằng số.", B: "Rời rạc nhận giá trị số nguyên đếm được, liên tục nhận mọi giá trị số thực.", C: "Rời rạc không tính được trung bình.", D: "Rời rạc có thứ bậc, liên tục không có thứ bậc." },
            correctAnswer: "B",
            explanation: "Rời rạc là các số nguyên đếm được (vd số con), liên tục đo lường được bằng số thập phân (vd chiều cao)."
        },
        {
            id: 5, category: "theory", difficulty: "medium",
            question: "Nguồn số liệu nào sau đây được xem là nguồn số liệu thứ cấp?",
            options: { A: "Đo trực tiếp huyết áp", B: "Phát phiếu khảo sát", C: "Lấy thông tin từ hồ sơ bệnh án cũ", D: "Phỏng vấn trực tiếp" },
            correctAnswer: "C",
            explanation: "Số liệu thứ cấp là dữ liệu đã có sẵn, thu thập từ trước cho mục đích khác như hồ sơ bệnh án lưu trữ."
        },
        {
            id: 6, category: "theory", difficulty: "medium",
            question: "Khi tập dữ liệu có chứa giá trị ngoại lai (outliers), tham số nào đo lường 'tâm' tốt hơn số trung bình (Mean)?",
            options: { A: "Mode", B: "Median", C: "SD", D: "Variance" },
            correctAnswer: "B",
            explanation: "Trung vị (Median) không bị ảnh hưởng mạnh bởi các giá trị ngoại lai."
        },
        {
            id: 7, category: "theory", difficulty: "hard",
            question: "Phân phối lệch phải (Right Skewed) có đặc điểm gì về vị trí tương đối giữa Mode, Median và Mean?",
            options: { A: "Mean < Median < Mode", B: "Mean = Median = Mode", C: "Mode < Median < Mean", D: "Median < Mode < Mean" },
            correctAnswer: "C",
            explanation: "Trong phân phối lệch phải, đuôi kéo dài về bên phải khiến Mean > Median > Mode."
        },
        {
            id: 8, category: "theory", difficulty: "hard",
            question: "Hệ số tương quan Pearson (r) có đặc điểm nào dưới đây?",
            options: { A: "Sử dụng thứ hạng để tính toán.", B: "Phát hiện mối liên hệ đơn điệu.", C: "Phù hợp cho dữ liệu thứ tự.", D: "Giả định dữ liệu có phân phối chuẩn và liên hệ tuyến tính." },
            correctAnswer: "D",
            explanation: "Pearson giả định dữ liệu có phân phối chuẩn và có mối liên hệ tuyến tính."
        },
        {
            id: 9, category: "exercise", difficulty: "easy",
            question: "Một điều dưỡng đo nhịp tim của 5 bệnh nhân: 70, 72, 75, 70, 80 (lần/phút). Mode của tập dữ liệu này là:",
            options: { A: "70", B: "72", C: "73.4", D: "75" },
            correctAnswer: "A",
            explanation: "Giá trị 70 xuất hiện nhiều nhất (2 lần)."
        },
        {
            id: 10, category: "exercise", difficulty: "easy",
            question: "Tính số trung vị (Median) của dãy tuổi bệnh nhân: 45, 52, 47, 50, 52.",
            options: { A: "47", B: "49.2", C: "50", D: "52" },
            correctAnswer: "C",
            explanation: "Sắp xếp tăng dần: 45, 47, 50, 52, 52. Số ở giữa là 50."
        },
        {
            id: 11, category: "exercise", difficulty: "medium",
            question: "Tính giá trị trung bình (Mean) của tập huyết áp tâm thu: 118, 125, 132, 120, 140 (mmHg).",
            options: { A: "125", B: "127", C: "130", D: "128" },
            correctAnswer: "B",
            explanation: "Mean = (118+125+132+120+140)/5 = 127."
        },
        {
            id: 12, category: "exercise", difficulty: "medium",
            question: "Giả sử độ lệch chuẩn là 10, kích thước mẫu n = 25. Tính sai số chuẩn (SE).",
            options: { A: "0.4", B: "2", C: "2.5", D: "5" },
            correctAnswer: "B",
            explanation: "SE = SD / sqrt(n) = 10 / sqrt(25) = 10 / 5 = 2."
        },
        {
            id: 13, category: "exercise", difficulty: "hard",
            question: "Xác suất 1 ca tiêm không phản ứng phụ là 0.9. Nếu tiêm 10 người, xác suất có đúng 8 người không bị phản ứng là:",
            options: { A: "~19.37%", B: "~25.50%", C: "~38.74%", D: "~10.00%" },
            correctAnswer: "A",
            explanation: "P(X=8) = C(10,8) * (0.9)^8 * (0.1)^2 = 45 * 0.43046 * 0.01 = 0.1937 (19.37%)."
        },
        {
            id: 14, category: "exercise", difficulty: "hard",
            question: "Xmax = 138, Xmin = 85. Số lớp k = 6. Khoảng cách lớp (h) xấp xỉ bằng:",
            options: { A: "7.5", B: "8.83", C: "10.2", D: "11.5" },
            correctAnswer: "B",
            explanation: "h = (Xmax - Xmin)/k = (138 - 85)/6 = 53/6 = 8.83."
        },
        {
            id: 15, category: "exercise", difficulty: "hard",
            question: "Tính hệ số biến thiên (CV) biết Mean = 73.4 và s = 4.39.",
            options: { A: "5.5%", B: "6.0%", C: "4.4%", D: "7.3%" },
            correctAnswer: "B",
            explanation: "CV = (s/Mean)*100% = (4.39/73.4)*100% = 5.98% (~6.0%)."
        },
        // ==========================================
        // LÝ THUYẾT - DỄ (30 Câu)
        // ==========================================
        {
            id: 16, category: "theory", difficulty: "easy",
            question: "Mục đích cuối cùng của thống kê trong ngành Điều dưỡng là gì?",
            options: { A: "Để thu thập càng nhiều dữ liệu càng tốt.", B: "Để lập các bảng biểu phức tạp.", C: "Chuyển biến số liệu thành bằng chứng để ra quyết định.", D: "Để dự đoán chính xác 100% tương lai." },
            correctAnswer: "C",
            explanation: "Theo bài Số liệu và Biến số, thống kê là khoa học chuyển biến số liệu thành bằng chứng để ra quyết định."
        },
        {
            id: 17, category: "theory", difficulty: "easy",
            question: "Biến số (Variable) được định nghĩa là gì?",
            options: { A: "Là các con số không bao giờ thay đổi.", B: "Là đặc tính có thể thay đổi và đo lường được của cá thể nghiên cứu.", C: "Là kết quả cuối cùng của một nghiên cứu y khoa.", D: "Là toàn bộ dân số được nghiên cứu." },
            correctAnswer: "B",
            explanation: "Biến số là một đặc tính hoặc thuộc tính của cá thể nghiên cứu có thể nhận các giá trị khác nhau (Ví dụ: Tuổi, Huyết áp)."
        },
        {
            id: 18, category: "theory", difficulty: "easy",
            question: "Biến số 'Giới tính (Nam/Nữ)' thuộc loại biến định tính nào?",
            options: { A: "Biến thứ bậc", B: "Biến liên tục", C: "Biến nhị phân", D: "Biến rời rạc" },
            correctAnswer: "C",
            explanation: "Biến nhị phân (Binary) là loại biến định tính chỉ có 2 giá trị đối lập nhau như Sống/Chết, Nam/Nữ."
        },
        {
            id: 19, category: "theory", difficulty: "easy",
            question: "Biến số 'Mức độ đau (Nhẹ, Vừa, Nặng)' thuộc loại biến nào?",
            options: { A: "Biến định danh", B: "Biến thứ bậc", C: "Biến rời rạc", D: "Biến nhị phân" },
            correctAnswer: "B",
            explanation: "Biến thứ bậc (Ordinal) là biến định tính mà các giá trị của nó có sự phân cấp, thứ tự rõ ràng."
        },
        {
            id: 20, category: "theory", difficulty: "easy",
            question: "Biến 'Số giường bệnh trong một khoa' là ví dụ của loại biến nào?",
            options: { A: "Biến định lượng liên tục", B: "Biến định lượng rời rạc", C: "Biến định tính định danh", D: "Biến định tính thứ bậc" },
            correctAnswer: "B",
            explanation: "Số giường bệnh là những con số nguyên, đếm được, do đó nó là biến định lượng rời rạc."
        },
        {
            id: 21, category: "theory", difficulty: "easy",
            question: "Số liệu thứ cấp (Secondary Data) là gì?",
            options: { A: "Là số liệu do chính điều dưỡng tự đo đạc trên bệnh nhân.", B: "Là số liệu phỏng vấn trực tiếp người nhà.", C: "Là số liệu đã có sẵn, được thu thập từ trước cho mục đích khác.", D: "Là số liệu thu thập qua phiếu khảo sát phát tận tay." },
            correctAnswer: "C",
            explanation: "Số liệu thứ cấp là những dữ liệu đã có sẵn như hồ sơ bệnh án cũ, báo cáo của Bộ Y tế."
        },
        {
            id: 22, category: "theory", difficulty: "easy",
            question: "Trường hợp nào sau đây là thu thập số liệu sơ cấp?",
            options: { A: "Lấy dữ liệu từ phần mềm quản lý bệnh viện.", B: "Tra cứu sổ ghi chép điều dưỡng của tháng trước.", C: "Đo đạc huyết áp trực tiếp cho bệnh nhân mới nhập viện.", D: "Đọc báo cáo y tế thường niên." },
            correctAnswer: "C",
            explanation: "Đo đạc trực tiếp là hành động tự thu thập số liệu mới cho mục đích cụ thể, tức là số liệu sơ cấp."
        },
        {
            id: 23, category: "theory", difficulty: "easy",
            question: "Sai số do máy đo huyết áp không được hiệu chuẩn thuộc loại sai số nào?",

            options: { A: "Định lượng liên tục", B: "Định danh", C: "Định tính thứ bậc (Ordinal)", D: "Nhị phân" },

            explanation: "Tuy BMI gốc là số liên tục, nhưng khi chia nhóm phân loại (Gầy, Bình thường, Thừa cân, Béo phì) thì nó trở thành biến Thứ bậc."
        },
        {
            id: 634, category: "exercise", difficulty: "medium",
            question: "Tình huống: Độ đặc hiệu (Specificity) của test viêm gan B là 95%. Nếu test trên 100 người KHÔNG MẮC BỆNH, sẽ có bao nhiêu người nhận kết quả Dương Tính Giả (FP)?",
            options: { A: "95 người", B: "5 người", C: "0 người", D: "100 người" },
            correctAnswer: "B",
            explanation: "Độ đặc hiệu 95% nghĩa là test báo đúng 95/100 người không bệnh (Âm tính thật). 5 người còn lại bị báo sai là có bệnh (Dương tính giả)."
        },
        {
            id: 635, category: "exercise", difficulty: "hard",
            question: "Tình huống: Kiểm định t-test cho giá trị p-value = 0.045. Nếu nhà nghiên cứu lặp lại thí nghiệm này 1000 lần (giả sử Ho thực sự đúng), sẽ có khoảng bao nhiêu thí nghiệm kết luận sai lầm rằng 'có sự khác biệt'?",
            options: { A: "0 lần", B: "45 lần", C: "50 lần", D: "955 lần" },
            correctAnswer: "C",
            explanation: "Nếu Ho đúng, xác suất bác bỏ sai Ho (Sai lầm loại 1) đúng bằng mức ý nghĩa Alpha (thường đặt là 0.05). 1000 * 0.05 = 50 lần. (p-value chỉ là kết quả của 1 mẫu cụ thể)."
        },
        {
            id: 636, category: "exercise", difficulty: "easy",
            question: "Tình huống: Để loại bỏ tác động của 1 biến gây nhiễu (Confounding variable) khi nghiên cứu ảnh hưởng của cà phê lên nhịp tim, phương pháp thiết kế nào thường dùng?",
            options: { A: "Lấy mẫu hệ thống", B: "Ghép cặp (Matching) theo biến nhiễu", C: "Lấy mẫu thuận tiện", D: "Vẽ biểu đồ Boxplot" },
            correctAnswer: "B",
            explanation: "Ghép cặp (Matching) ví dụ như độ tuổi, giới tính giúp triệt tiêu sự khác biệt do các yếu tố nhiễu gây ra."
        },
        {
            id: 637, category: "exercise", difficulty: "medium",
            question: "Tình huống: Một bảng dữ liệu có N = 500. Tính bậc tự do df_within cho kiểm định ANOVA với 5 nhóm (k = 5).",
            options: { A: "4", B: "495", C: "499", D: "100" },
            correctAnswer: "B",
            explanation: "df_within = N - k = 500 - 5 = 495."
        },

    ];

    let currentQuizData = [];
    let userAnswers = {};
    let timerInterval = null;
    let timeRemaining = 3600;

    function showSection(sectionId) {
        document.getElementById('homePage').classList.add('hidden');
        document.getElementById('quizPage').classList.add('hidden');
        document.getElementById('resultPage').classList.add('hidden');
        document.getElementById('historyPage').classList.add('hidden');
        document.getElementById(sectionId).classList.remove('hidden');
        window.scrollTo(0, 0);
    }

    function goHome() {
        clearInterval(timerInterval);
        showSection('homePage');
    }

    function showHistory() {
        renderHistory();
        showSection('historyPage');
    }

    function shuffleArray(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function getQuestions(category, difficulty, targetAmount) {
        let filtered = quizDatabase.filter(q => q.category === category && q.difficulty === difficulty);
        shuffleArray(filtered);
        return filtered.slice(0, Math.min(targetAmount, filtered.length));
    }

    function generateQuiz() {
        let selectedQuestions = [];
        
        selectedQuestions = selectedQuestions.concat(getQuestions("theory", "easy", 12));
        selectedQuestions = selectedQuestions.concat(getQuestions("theory", "medium", 8));
        selectedQuestions = selectedQuestions.concat(getQuestions("theory", "hard", 5));
        
        selectedQuestions = selectedQuestions.concat(getQuestions("exercise", "easy", 8));
        selectedQuestions = selectedQuestions.concat(getQuestions("exercise", "medium", 4));
        selectedQuestions = selectedQuestions.concat(getQuestions("exercise", "hard", 3));

        shuffleArray(selectedQuestions);
        return selectedQuestions;
    }

    function startQuiz() {
        currentQuizData = generateQuiz();
        userAnswers = {};
        timeRemaining = 3600;
        
        renderQuizInterface();
        startTimer();
        showSection('quizPage');
    }

    function renderQuizInterface() {
        const quizContainer = document.getElementById('quizContainer');
        quizContainer.innerHTML = '';

        currentQuizData.forEach((questionObj, index) => {
            let questionHtml = `
                <div class="question-card" id="q${index}">
                    <div class="question-text">Câu ${index + 1}: ${questionObj.question}</div>
            `;
            
            for (let optionKey in questionObj.options) {
                questionHtml += `
                    <label class="option-label" onclick="selectRadio('ans_${index}_${optionKey}')">
                        <input type="radio" id="ans_${index}_${optionKey}" name="answer_${index}" value="${optionKey}" onchange="recordAnswer(${index}, '${optionKey}')">
                        <span><strong>${optionKey}.</strong> ${questionObj.options[optionKey]}</span>
                    </label>
                `;
            }
            questionHtml += `</div>`;
            quizContainer.innerHTML += questionHtml;
        });
    }

    function selectRadio(elementId) {
        const radio = document.getElementById(elementId);
        radio.checked = true;
        radio.dispatchEvent(new Event('change'));
    }

    function recordAnswer(questionIndex, answerKey) {
        userAnswers[questionIndex] = answerKey;
    }

    function startTimer() {
        clearInterval(timerInterval);
        updateTimerUI();
        timerInterval = setInterval(() => {
            timeRemaining--;
            updateTimerUI();
            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                submitQuiz(true);
            }
        }, 1000);
    }

    function updateTimerUI() {
        let m = Math.floor(timeRemaining / 60);
        let s = timeRemaining % 60;
        document.getElementById('timerDisplay').innerHTML = `
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            ${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}
        `;
    }

    function submitQuiz(isTimeUp = false) {
        if(!isTimeUp) {
            if(!confirm("Are you sure you want to submit your quiz?")) return;
        } else {
            alert("Time is up! Your quiz has been submitted automatically.");
        }
        
        clearInterval(timerInterval);

        let score = 0;
        let resultDetails = [];

        currentQuizData.forEach((questionObj, index) => {
            let userAnswer = userAnswers[index] || null;
            let isCorrect = userAnswer === questionObj.correctAnswer;
            if (isCorrect) score++;

            resultDetails.push({
                question: questionObj.question,
                userAnswer: userAnswer,
                correctAnswer: questionObj.correctAnswer,
                options: questionObj.options,
                explanation: questionObj.explanation,
                isCorrect: isCorrect
            });
        });

        saveToHistory(score, resultDetails);
        displayReview(score, resultDetails);
        showSection('resultPage');
    }

    function displayReview(score, resultDetails) {
        document.getElementById('scoreDisplay').innerText = `${score}/${currentQuizData.length}`;
        const reviewContainer = document.getElementById('reviewContainer');
        reviewContainer.innerHTML = '';

        resultDetails.forEach((detail, index) => {
            let colorClass = detail.isCorrect ? 'text-success' : 'text-danger';
            let uAnswerText = detail.userAnswer ? `${detail.userAnswer}. ${detail.options[detail.userAnswer]}` : "Chưa trả lời";
            let cAnswerText = `${detail.correctAnswer}. ${detail.options[detail.correctAnswer]}`;
            
            reviewContainer.innerHTML += `
                <div class="question-card" style="border-left: 5px solid ${detail.isCorrect ? 'var(--success)' : 'var(--danger)'}">
                    <div class="question-text">Câu ${index + 1}: ${detail.question}</div>
                    <p style="margin-bottom: 8px;">Bạn chọn: <span class="${colorClass}">${uAnswerText}</span></p>
                    <p>Đáp án đúng: <span class="text-success">${cAnswerText}</span></p>
                    <div class="explanation-box"><strong>Giải thích:</strong> ${detail.explanation}</div>
                </div>
            `;
        });
    }

    function saveToHistory(score, resultDetails) {
        let history = JSON.parse(localStorage.getItem('quizHistory')) || [];
        let date = new Date();
        history.push({
            date: date.toLocaleString('vi-VN'),
            score: score,
            total: currentQuizData.length,
            details: resultDetails
        });
        localStorage.setItem('quizHistory', JSON.stringify(history));
    }

    function renderHistory() {
        const historyContainer = document.getElementById('historyContainer');
        historyContainer.innerHTML = '';
        let history = JSON.parse(localStorage.getItem('quizHistory')) || [];

        if (history.length === 0) {
            historyContainer.innerHTML = '<div style="text-align:center; color: var(--text-light); padding: 40px;">Chưa có dữ liệu làm bài.</div>';
            return;
        }

        history.slice().reverse().forEach((record, i) => {
            historyContainer.innerHTML += `
                <div class="history-item">
                    <div>
                        <div style="font-size: 14px; color: var(--text-light); margin-bottom: 5px;">Ngày thi: ${record.date}</div>
                        <div class="history-score">${record.score} / ${record.total}</div>
                    </div>
                    <button class="btn-outline" onclick="toggleDetails('details_${i}')">Xem chi tiết</button>
                    
                    <div id="details_${i}" class="hidden" style="width: 100%; margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 20px;">
                        ${generateDetailsHTML(record.details)}
                    </div>
                </div>
            `;
        });
    }

    function generateDetailsHTML(details) {
        let html = '';
        details.forEach((d, idx) => {
            let cClass = d.isCorrect ? 'text-success' : 'text-danger';
            let uAns = d.userAnswer ? d.userAnswer : "Chưa chọn";
            html += `
                <div style="margin-bottom: 15px; background: #fafbff; padding: 15px; border-radius: 8px;">
                    <p style="font-weight: 600; margin-bottom: 5px;">Câu ${idx+1}: ${d.question}</p>
                    <p style="font-size: 14px;">Lựa chọn của bạn: <span class="${cClass}">${uAns}</span> | Đáp án đúng: <span class="text-success">${d.correctAnswer}</span></p>
                </div>
            `;
        });
        return html;
    }

    function toggleDetails(id) {
        const el = document.getElementById(id);
        if (el.classList.contains('hidden')) el.classList.remove('hidden');
        else el.classList.add('hidden');
    }

    function clearHistory() {
        if(confirm("Are you sure you want to clear all history?")) {
            localStorage.removeItem('quizHistory');
            renderHistory();
        }
    }
</script>
